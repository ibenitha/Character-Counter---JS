<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic document setup and page title -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>

    <!-- Load the DM Sans font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />

    <!-- Connect the HTML to the external CSS file -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Main application container -->
    <div class="app">

      <!-- Header with logo and theme switch -->
      <header class="header">
        <a class="header__logo" href="#" aria-label="Character Counter home">
          <img
            class="header__logo-img"
            src="assets/images/Logo mark.png"
            alt="Character Counter logo"
            width="32"
            height="40"
          />
          <span>Character Counter</span>
        </a>

        <!-- Hidden checkbox used as the theme switch -->
        <input
          type="checkbox"
          class="theme-switch visually-hidden"
          id="theme-switch"
        />

        <!-- Label acts as the visible theme toggle -->
        <label class="theme-toggle" for="theme-switch">
          <span class="visually-hidden">Switch theme</span>

          <!-- Icons for the two themes -->
          <img
            class="theme-toggle__icon theme-toggle__icon--sun"
            src="assets/images/icon-sun.svg"
            alt=""
            width="24"
            height="24"
          />
          <img
            class="theme-toggle__icon theme-toggle__icon--moon"
            src="assets/images/icon-moon.svg"
            alt=""
            width="24"
            height="24"
          />
        </label>
      </header>

      <main>

        <!-- Main page heading -->
        <h1 class="hero-title">
          Analyze your text<br />
          in real-time.
        </h1>

        <!-- Main text analysis section -->
        <section aria-labelledby="analyzer-label">

          <!-- Hidden heading for accessibility -->
          <h2 id="analyzer-label" class="visually-hidden">
            Text analyzer
          </h2>

          <!-- Text input area and character limit warning -->
          <div class="textarea-wrapper">
            <textarea
              class="textarea"
              rows="9"
              placeholder="Start typing here..."
              aria-describedby="reading-time char-limit-warning"
            >Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.</textarea>

            <!-- Warning shown when the character limit is exceeded -->
            <p
              class="char-limit-warning"
              id="char-limit-warning"
              role="alert"
              aria-live="polite"
              hidden
            >
              Limit reached! Your text exceeds
              <span id="char-limit-value">300</span>
              characters.
            </p>
          </div>

          <!-- User controls and reading-time information -->
          <div class="controls">

            <!-- Options for excluding spaces and setting a limit -->
            <div class="controls__options">

              <!-- Checkbox for excluding spaces from the character count -->
              <label class="checkbox">
                <input
                  class="checkbox__input"
                  type="checkbox"
                  id="exclude-spaces"
                />
                <span
                  class="checkbox__box"
                  aria-hidden="true"
                ></span>
                <span class="checkbox__label">
                  Exclude Spaces
                </span>
              </label>

              <!-- Checkbox for enabling the character limit -->
              <label class="checkbox">
                <input
                  class="checkbox__input"
                  type="checkbox"
                  id="set-limit"
                />
                <span
                  class="checkbox__box"
                  aria-hidden="true"
                ></span>
                <span class="checkbox__label">
                  Set Character Limit
                </span>
              </label>

              <!-- Input for entering the character limit -->
              <div class="limit-input-wrapper">
                <label
                  class="limit-input-label"
                  for="character-limit"
                >
                  Character limit
                </label>

                <input
                  class="limit-input"
                  type="number"
                  id="character-limit"
                  min="1"
                  value="300"
                  aria-label="Character limit"
                />
              </div>
            </div>

            <!-- Reading time is updated by JavaScript -->
            <p
              class="reading-time"
              id="reading-time"
            >
              Approx. reading time:
              <span>&lt;1 minute</span>
            </p>
          </div>

          <!-- Statistics cards -->
          <div class="stats">

            <!-- Total characters card -->
            <div
              class="card stat-card stat-card--characters purple"
            >
              <!-- Decorative background pattern -->
              <div class="pattern"></div>

              <!-- JavaScript updates this value -->
              <p class="stat-card__value number">00</p>

              <p class="stat-card__label label">
                Total Characters
              </p>
            </div>

            <!-- Word count card -->
            <div
              class="card stat-card stat-card--words orange"
            >
              <div class="pattern"></div>

              <!-- JavaScript updates this value -->
              <p class="stat-card__value number">00</p>

              <p class="stat-card__label label">
                Word Count
              </p>
            </div>

            <!-- Sentence count card -->
            <div
              class="card stat-card stat-card--lines coral"
            >
              <div class="pattern"></div>

              <!-- JavaScript updates this value -->
              <p class="stat-card__value number">00</p>

              <p class="stat-card__label label">
                Sentence Count
              </p>
            </div>
          </div>

          <!-- Letter density section -->
          <section
            class="letter-density"
            aria-labelledby="density-title"
          >
            <h2
              class="letter-density__title"
              id="density-title"
            >
              Letter Density
            </h2>

            <!-- JavaScript dynamically adds letter-density items here -->
            <ul
              class="letter-density__list"
              id="density-list"
              aria-live="polite"
              aria-label="Letter frequency breakdown"
            ></ul>

            <!-- Button for showing more or fewer density results -->
            <button
              class="density-toggle"
              id="density-toggle"
              aria-expanded="false"
              hidden
            >
              See more
            </button>
          </section>

        </section>
      </main>
    </div>

    <!-- Load the analysis functions first -->
    <script src="assets/js/character-counter.js"></script>

    <!-- Inline JavaScript connects the analysis logic to the UI -->
    <script>

      // Select the HTML elements needed by JavaScript
      const themeSwitch = document.getElementById('theme-switch');
      const root = document.documentElement;
      const textarea = document.querySelector('.textarea');
      const textareaWrapper = document.querySelector('.textarea-wrapper');
      const excludeSpaces = document.getElementById('exclude-spaces');
      const setLimit = document.getElementById('set-limit');
      const characterLimitInput =
        document.getElementById('character-limit');

      const totalCharactersValue =
        document.querySelector(
          '.stat-card--characters .stat-card__value'
        );

      const wordCountValue =
        document.querySelector(
          '.stat-card--words .stat-card__value'
        );

      const sentenceCountValue =
        document.querySelector(
          '.stat-card--lines .stat-card__value'
        );

      const readingTimeValue =
        document.querySelector('.reading-time span');

      const densityList =
        document.getElementById('density-list');

      const densityToggle =
        document.getElementById('density-toggle');

      const charLimitWarning =
        document.getElementById('char-limit-warning');

      const charLimitValueSpan =
        document.getElementById('char-limit-value');

      const charCard =
        document.querySelector('.stat-card--characters');

      const logoImage =
        document.querySelector('.header__logo-img');


      // Update the theme by adding or removing the theme-light class
      function updateTheme() {
        if (themeSwitch.checked) {
          root.classList.add('theme-light');
          logoImage.src = 'assets/images/Logo.png';
        } else {
          root.classList.remove('theme-light');
          logoImage.src = 'assets/images/Logo mark.png';
        }
      }


      // Apply or remove visual styles when the character limit is exceeded
      function setOverLimitState(overLimit) {
        textarea.classList.toggle(
          'textarea--over-limit',
          overLimit
        );

        textareaWrapper.classList.toggle(
          'textarea-wrapper--over-limit',
          overLimit
        );

        charCard.classList.toggle(
          'stat-card--over-limit',
          overLimit
        );

        charLimitWarning.hidden = !overLimit;
      }


      // Control how many letter-density results are initially displayed
      const DENSITY_INITIAL = 5;

      // Track whether the density list is expanded
      let densityExpanded = false;

      // Store the latest density results
      let lastDensity = [];


      // Render the letter-density data in the HTML
      function renderDensityList() {

        // Show an empty message when there are no letters
        if (lastDensity.length === 0) {
          densityList.innerHTML =
            '<li class="density-empty">' +
            'No characters found. Start typing above.' +
            '</li>';

          densityToggle.hidden = true;
          return;
        }

        // Show all results or only the first five
        const visible = densityExpanded
          ? lastDensity
          : lastDensity.slice(0, DENSITY_INITIAL);

        // Convert the data into HTML elements
        densityList.innerHTML = visible
          .map((item) => `
            <li class="density-item">
              <span class="density-item__letter">
                ${item.letter}
              </span>

              <div
                class="density-item__bar"
                role="presentation"
              >
                <div
                  class="density-item__fill"
                  style="width: ${Math.min(
                    item.percentage,
                    100
                  )}%"
                ></div>
              </div>

              <span class="density-item__stats">
                ${item.count} (${item.percentage}%)
              </span>
            </li>
          `)
          .join('');

        // Show the toggle only when more than five items exist
        const hasMore =
          lastDensity.length > DENSITY_INITIAL;

        densityToggle.hidden = !hasMore;

        if (hasMore) {
          densityToggle.textContent =
            densityExpanded
              ? 'See less'
              : 'See more';

          densityToggle.setAttribute(
            'aria-expanded',
            String(densityExpanded)
          );
        }
      }


      // Toggle between showing more and fewer density results
      densityToggle.addEventListener(
        'click',
        () => {
          densityExpanded = !densityExpanded;
          renderDensityList();
        }
      );


      // Main function that analyzes the text and updates the UI
      function renderAnalysis() {

        // Get the analysis results from the external JavaScript file
        const result = analyzeText(
          textarea.value,
          {
            excludeSpaces: excludeSpaces.checked,
          }
        );


        // Update the statistics cards
        totalCharactersValue.textContent =
          String(result.totalCharacters).padStart(2, '0');

        wordCountValue.textContent =
          String(result.wordCount).padStart(2, '0');

        sentenceCountValue.textContent =
          String(result.sentenceCount).padStart(2, '0');


        // Check and validate the character limit
        const limitEnabled =
          setLimit.checked;

        const characterLimit =
          Number(characterLimitInput.value);

        const limitIsValid =
          limitEnabled &&
          Number.isFinite(characterLimit) &&
          characterLimit > 0;

        const overLimit =
          limitIsValid &&
          result.totalCharacters > characterLimit;


        // Update the reading time and limit status
        if (limitIsValid) {
          const badge = overLimit
            ? '⚠ over limit'
            : '✓ within limit';

          readingTimeValue.textContent =
            `${result.readingTime} · ${badge}`;
        } else {
          readingTimeValue.textContent =
            result.readingTime;
        }


        // Update the warning and visual over-limit state
        if (limitIsValid) {
          charLimitValueSpan.textContent =
            characterLimit;
        }

        setOverLimitState(overLimit);


        // Save and display the latest letter-density results
        lastDensity = result.density;
        renderDensityList();
      }


      // Re-run the analysis whenever the user changes the inputs
      [
        textarea,
        excludeSpaces,
        setLimit,
        characterLimitInput
      ].forEach((el) => {

        el.addEventListener(
          'input',
          renderAnalysis
        );

        el.addEventListener(
          'change',
          renderAnalysis
        );
      });


      // Update the theme whenever the theme checkbox changes
      themeSwitch.addEventListener(
        'change',
        updateTheme
      );


      // Run the initial setup when the page loads
      updateTheme();
      renderAnalysis();

    </script>
  </body>
</html>
