<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <a class="header__logo" href="#" aria-label="Character Counter home">
          <div class="brand-logo" aria-hidden="true">
            <div class="brand-logo-left"></div>
            <div class="brand-logo-right"></div>
          </div>
          <span>Character Counter</span>
        </a>

        <input
          type="checkbox"
          class="theme-switch visually-hidden"
          id="theme-switch"
        />
        <label class="theme-toggle" for="theme-switch">
          <span class="visually-hidden">Switch theme</span>
          <img
            class="theme-toggle__icon theme-toggle__icon--sun"
            src="assets/images/icon-sun.svg"
            alt=""
            width="24"
            height="24"
          />
          <img
            class="theme-toggle__icon theme-toggle__icon--moon"
            src="assets/images/icon-moon.svg"
            alt=""
            width="24"
            height="24"
          />
        </label>
      </header>

      <main class="main">
        <h1 class="hero-title">
          Analyze your text<br class="hero-title__break" />
          in real-time.
        </h1>

        <section class="analyzer" aria-labelledby="analyzer-label">
          <h2 id="analyzer-label" class="visually-hidden">Text analyzer</h2>

          <div class="textarea-wrapper">
            <textarea
              class="textarea"
              rows="9"
              placeholder="Start typing here..."
              aria-describedby="reading-time char-limit-warning"
            >Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.</textarea>
            <!-- Warning shown when character limit is exceeded -->
            <p class="char-limit-warning" id="char-limit-warning" role="alert" aria-live="polite" hidden>
              Character limit exceeded
            </p>
          </div>

          <div class="controls">
            <div class="controls__options">
              <label class="checkbox">
                <input
                  class="checkbox__input"
                  type="checkbox"
                  id="exclude-spaces"
                />
                <span class="checkbox__box" aria-hidden="true"></span>
                <span class="checkbox__label">Exclude Spaces</span>
              </label>

              <label class="checkbox">
                <input class="checkbox__input" type="checkbox" id="set-limit" />
                <span class="checkbox__box" aria-hidden="true"></span>
                <span class="checkbox__label">Set Character Limit</span>
              </label>

              <div class="limit-input-wrapper">
                <label class="limit-input-label" for="character-limit">
                  Character limit
                </label>
                <input
                  class="limit-input"
                  type="number"
                  id="character-limit"
                  min="1"
                  value="300"
                  aria-label="Character limit"
                />
              </div>
            </div>

            <p class="reading-time" id="reading-time">
              Approx. reading time: <span>&lt;1 minute</span>
            </p>
          </div>

          <div class="stats">
            <div class="card stat-card stat-card--characters purple">
              <div class="pattern">
                <img src="assets/images/pattern-characters.svg" alt="" aria-hidden="true" class="pattern__img" />
              </div>
              <p class="stat-card__value number">00</p>
              <p class="stat-card__label label">Total Characters</p>
            </div>

            <div class="card stat-card stat-card--words orange">
              <div class="pattern"></div>
              <p class="stat-card__value number">00</p>
              <p class="stat-card__label label">Word Count</p>
            </div>

            <div class="card stat-card stat-card--lines coral">
              <div class="pattern"></div>
              <p class="stat-card__value number">00</p>
              <p class="stat-card__label label">Sentence Count</p>
            </div>
          </div>

          <section class="letter-density" aria-labelledby="density-title">
            <h2 class="letter-density__title" id="density-title">
              Letter Density
            </h2>

            <ul class="letter-density__list" id="density-list" aria-live="polite" aria-label="Letter frequency breakdown"></ul>

            <button
              class="density-toggle"
              id="density-toggle"
              aria-expanded="false"
              hidden
            >
              Show more
            </button>
          </section>
        </section>
      </main>
    </div>
    <script src="assets/js/character-counter.js"></script>
    <script>
      const themeSwitch = document.getElementById('theme-switch');
      const root = document.documentElement;
      const textarea = document.querySelector('.textarea');
      const textareaWrapper = document.querySelector('.textarea-wrapper');
      const excludeSpaces = document.getElementById('exclude-spaces');
      const setLimit = document.getElementById('set-limit');
      const characterLimitInput = document.getElementById('character-limit');
      const totalCharactersValue = document.querySelector('.stat-card--characters .stat-card__value');
      const wordCountValue = document.querySelector('.stat-card--words .stat-card__value');
      const sentenceCountValue = document.querySelector('.stat-card--lines .stat-card__value');
      const readingTimeValue = document.querySelector('.reading-time span');
      const densityList = document.getElementById('density-list');
      const densityToggle = document.getElementById('density-toggle');
      const charLimitWarning = document.getElementById('char-limit-warning');
      const charCard = document.querySelector('.stat-card--characters');

      // ── Theme ──────────────────────────────────────────────────────────────
      function updateTheme() {
        if (themeSwitch.checked) {
          root.classList.add('theme-light');
        } else {
          root.classList.remove('theme-light');
        }
      }

      // ── Limit helpers ──────────────────────────────────────────────────────

      /**
       * Apply or remove the over-limit visual state.
       * @param {boolean} overLimit
       */
      function setOverLimitState(overLimit) {
        textarea.classList.toggle('textarea--over-limit', overLimit);
        textareaWrapper.classList.toggle('textarea-wrapper--over-limit', overLimit);
        charCard.classList.toggle('stat-card--over-limit', overLimit);
        charLimitWarning.hidden = !overLimit;
      }

      // ── Density "Show more / Show less" toggle ─────────────────────────────
      const DENSITY_INITIAL = 5;
      let densityExpanded = false;
      /** @type {Array<{letter: string, count: number, percentage: string}>} */
      let lastDensity = [];

      function renderDensityList() {
        // Show an empty-state message when there are no letters to analyse
        if (lastDensity.length === 0) {
          densityList.innerHTML = '<li class="density-empty">No characters found. Start typing above.</li>';
          densityToggle.hidden = true;
          return;
        }

        const visible = densityExpanded ? lastDensity : lastDensity.slice(0, DENSITY_INITIAL);

        densityList.innerHTML = visible
          .map((item) => `
            <li class="density-item">
              <span class="density-item__letter">${item.letter}</span>
              <div class="density-item__bar" role="presentation">
                <div class="density-item__fill" style="width: ${Math.min(item.percentage, 100)}%"></div>
              </div>
              <span class="density-item__stats">${item.count} (${item.percentage}%)</span>
            </li>
          `)
          .join('');

        // Only show toggle button if there are more rows than the initial limit
        const hasMore = lastDensity.length > DENSITY_INITIAL;
        densityToggle.hidden = !hasMore;
        if (hasMore) {
          densityToggle.textContent = densityExpanded ? 'Show less' : 'Show more';
          densityToggle.setAttribute('aria-expanded', String(densityExpanded));
        }
      }

      densityToggle.addEventListener('click', () => {
        densityExpanded = !densityExpanded;
        renderDensityList();
      });

      // ── Main render ────────────────────────────────────────────────────────
      function renderAnalysis() {
        const result = analyzeText(textarea.value, {
          excludeSpaces: excludeSpaces.checked,
        });

        // Update stat cards
        totalCharactersValue.textContent = String(result.totalCharacters).padStart(2, '0');
        wordCountValue.textContent       = String(result.wordCount).padStart(2, '0');
        sentenceCountValue.textContent   = String(result.sentenceCount).padStart(2, '0');

        // Reading time + optional limit badge
        const limitEnabled    = setLimit.checked;
        const characterLimit  = Number(characterLimitInput.value);
        const limitIsValid    = limitEnabled && Number.isFinite(characterLimit) && characterLimit > 0;
        const overLimit       = limitIsValid && result.totalCharacters > characterLimit;

        if (limitIsValid) {
          const badge = overLimit ? '⚠ over limit' : '✓ within limit';
          readingTimeValue.textContent = `${result.readingTime} · ${badge}`;
        } else {
          readingTimeValue.textContent = result.readingTime;
        }

        // Limit warning feedback
        setOverLimitState(overLimit);

        // Letter density — store then render
        lastDensity = result.density;
        renderDensityList();
      }

      // ── Event listeners ────────────────────────────────────────────────────
      [textarea, excludeSpaces, setLimit, characterLimitInput].forEach((el) => {
        el.addEventListener('input', renderAnalysis);
        el.addEventListener('change', renderAnalysis);
      });

      themeSwitch.addEventListener('change', updateTheme);

      // ── Init ───────────────────────────────────────────────────────────────
      updateTheme();
      renderAnalysis();
    </script>
  </body>
</html>
